version: 2
updates:
  # Check for npm dependency updates
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Group all minor and patch updates together, keep major separate for review
    groups:
      dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 10
    ignore:
      # Keep @types/node aligned with the Node LTS line the extension host runs on.
      # Major bumps (e.g. the non-LTS "Current" line) are pinned manually; still take patch/minor.
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
    labels:
      - "dependencies"
      - "npm"

  # Check for GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
